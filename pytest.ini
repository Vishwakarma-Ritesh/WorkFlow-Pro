[pytest]
minversion = 8.0
testpaths = tests
pythonpath = src
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
    --tracing retain-on-failure
    --screenshot only-on-failure
    --full-page-screenshot
    --html=reports/html/report.html
    --self-contained-html
    --alluredir=reports/allure-results
markers =
    api: backend service tests
    integration: API and UI integration tests
    mobile: mobile web tests
    smoke: high-value release confidence tests
    tenant_isolation: validates multi-tenant security boundaries
    ui: browser UI tests
    external: requires a configured WorkFlow Pro environment
    browserstack: executes through BrowserStack Automate
filterwarnings =
    error
